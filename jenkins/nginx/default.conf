# --- HTTP: ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name jenkins.devopstrainer.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: reverse proxy to Jenkins
server {
    listen 443 ssl;
    http2 on;
    server_name jenkins.devopstrainer.cloud;

    ssl_certificate     /etc/letsencrypt/live/jenkins.devopstrainer.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.devopstrainer.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    location / {
        proxy_pass http://jenkins:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long-running pipeline log streams
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
