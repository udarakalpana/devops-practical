# --- HTTP
server {
    listen 80;
    server_name api.devopstrainer.cloud www.devopstrainer.cloud devopstrainer.cloud jenkins.devopstrainer.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


server {
    listen 443 ssl;
    http2 on;
    server_name api.devopstrainer.cloud;

    ssl_certificate     /etc/letsencrypt/live/api.devopstrainer.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.devopstrainer.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/public;
    index index.php;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.devopstrainer.cloud devopstrainer.cloud;

    ssl_certificate     /etc/letsencrypt/live/www.devopstrainer.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.devopstrainer.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name jenkins.devopstrainer.cloud;

    ssl_certificate     /etc/letsencrypt/live/jenkins.devopstrainer.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.devopstrainer.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    location / {
        proxy_pass http://jenkins:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Jenkins streams long-running build logs over a single connection
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
