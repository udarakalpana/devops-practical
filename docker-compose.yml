services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: devops-test-app
        restart: unless-stopped
        volumes:
            - storage-data:/var/www/storage
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env.docker
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: devops-test-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./public:/var/www/public:ro
            - certbot-webroot:/var/www/certbot:ro
            - certbot-etc:/etc/letsencrypt:ro
        depends_on:
            - app
        networks:
            - app-network

    certbot:
        image: certbot/certbot:latest
        container_name: devops-test-certbot
        volumes:
            - certbot-webroot:/var/www/certbot
            - certbot-etc:/etc/letsencrypt
        entrypoint: /bin/sh
        command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
        depends_on:
            - nginx
        networks:
            - app-network

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                VITE_API_URL: ${VITE_API_URL:-https://api.devopstrainer.cloud/api}
        container_name: devops-test-frontend
        restart: unless-stopped
        expose:
            - "80"
        depends_on:
            - nginx
        networks:
            - app-network

    db:
        image: mysql:8.0
        container_name: devops-test-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: devops_test
            MYSQL_ROOT_PASSWORD: "12345678"
            MYSQL_USER: devops_test
            MYSQL_PASSWORD: "12345678"
        volumes:
            - db-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - app-network

volumes:
    db-data:
    storage-data:
    certbot-webroot:
    certbot-etc:

networks:
    app-network:
        driver: bridge
